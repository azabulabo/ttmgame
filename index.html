<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>つとむゲーム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --base-width: 375px; --base-height: 667px; }
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }
        
        #game-container { 
            position: relative; 
            width: var(--base-width); 
            height: var(--base-height); 
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 15%, rgba(0,0,0,0) 30%),
                url('background.png');
            background-size: cover;
            background-position: center;
            overflow: hidden; 
        }
        
        #game-container canvas { image-rendering: pixelated; }

        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; cursor: pointer; }
        #start-screen { background: rgba(0,0,0,0.85); }
        #pause-screen { background: rgba(0,0,0,0.7); display: none; z-index: 60; }

        .blink-msg { color: #2ecc71; font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #2ecc71; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #score-box { position: absolute; top: 15px; left: 15px; }
        #best-box { position: absolute; top: 15px; left: 100px; }
        #timer-box { position: absolute; top: 15px; left: 55%; transform: translateX(-50%); text-align: center; }
        
        #pause-btn { 
            position: absolute; top: 15px; right: 15px; color: white; display: none; 
            font-size: 24px; font-weight: bold; text-shadow: 0 0 8px #2ecc71;
            cursor: pointer; pointer-events: auto; z-index: 20;
        }

        #restart-btn-small {
            margin-top: 80px; padding: 10px 20px; background: none; border: 1px solid #666; 
            color: #888; border-radius: 20px; font-size: 14px; cursor: pointer; display: none;
        }

        #deadline { position: absolute; top: 110px; width: 100%; height: 2px; border-top: 2px dashed #e74c3c; opacity: 0.4; z-index: 5; }
        #deadline.danger { opacity: 1; border-top: 2px solid #f00; box-shadow: 0 0 15px #f00; animation: blink-red 0.4s infinite; }
        @keyframes blink-red { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        #next-container { position: absolute; top: 70px; right: 10px; width: 85px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 20px; display: flex; align-items: center; justify-content: space-around; border: 1px solid rgba(255,255,255,0.2); }
        .next-item { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .next-image { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: none; }
        .value { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 8px #2ecc71; }
        
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,20,0,0.95); color: white; padding: 40px; border-radius: 20px; text-align: center; display: none; z-index: 1000; border: 3px solid #2ecc71; width: 75%; pointer-events: auto; }
        #retry-btn { display: none; margin-top: 25px; padding: 15px 40px; border-radius: 30px; background: #2ecc71; border: none; font-weight: bold; font-size: 18px; color: #000; cursor: pointer; }
        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="loading">DINO LOADING...</div>
    <div id="start-screen" class="overlay-screen">
        <div class="blink-msg">タップしてスタート</div>
    </div>
    <div id="pause-screen" class="overlay-screen" onclick="resumeGame()">
        <div class="blink-msg">タップして再開</div>
        <button id="restart-btn-small" onclick="location.reload()">最初からやり直し</button>
    </div>
    <div id="pause-btn" onclick="pauseGame()">⏸</div>
    <div id="deadline"></div>
    <div id="ui-layer">
        <div id="score-box"><div style="font-size:10px; color:#aaa;">SCORE</div><div id="score" class="value">0</div></div>
        <div id="best-box"><div style="font-size:10px; color:#aaa;">BEST</div><div id="best-score" class="value" style="color:#2ecc71;">0</div></div>
        <div id="timer-box"><div style="font-size:10px; color:#aaa;">TIME</div><div id="timer" class="value">45</div></div>
        <div id="next-container">
            <div id="n1-box" class="next-item"><img id="n1-img" class="next-image"></div>
            <div id="n2-box" class="next-item" style="opacity: 0.3;"><img id="n2-img" class="next-image"></div>
        </div>
    </div>
    <div id="game-over">
        <div id="new-record" style="display:none; color:#ffeb3b;">✨ NEW RECORD ✨</div>
        <h1 id="over-title">終了</h1>
        <p id="over-reason" style="margin-bottom:20px; color:#ccc;"></p>
        <div id="final-score" class="value" style="font-size:48px;">0</div>
        <button id="retry-btn" onclick="location.reload()">もう一度遊ぶ</button>
    </div>
</div>

<script>
const audioStatus = { bgm: true, rotate: true, merge: true, disappear: true, final: true };
const bgm = new Audio('bgm.mp3');
const seRotate = new Audio('rotate.mp3');
const seMerge = new Audio('merge.mp3');
const seDisappear = new Audio('disappear.mp3');
const seFinal = new Audio('final.mp3');

const { Engine, Render, Runner, World, Bodies, Events, Composite, Vector, Body } = Matter;
const WIDTH = 375, HEIGHT = 667, LIMIT_Y = 110;
const faceImages = [], obstacleImages = [], faceImageReady = [], obstacleImageReady = [];
let score = 0, highScore = parseInt(localStorage.getItem('suika_high_score')) || 0;
let timeLeft = 45, isGameOver = false, gameStarted = false, isPaused = false, canResume = false;
let nextQueue = [0, 0, 0].map(() => Math.floor(Math.random() * 3));
let isDragging = false, currentX = WIDTH/2, currentAngle = 0, lastSoundX = WIDTH/2, canDrop = true;
let particles = [], activeBigExplosion = false;

const engine = Engine.create();
const runner = Runner.create();
const render = Render.create({ element: document.getElementById('game-container'), engine: engine, options: { width: WIDTH, height: HEIGHT, wireframes: false, background: 'transparent' } });
engine.world.gravity.scale *= 1.5;

function preloadImages(callback) {
    let loaded = 0; const total = 17;
    const check = () => { if (++loaded === total) { document.getElementById('loading').style.display='none'; callback(); } };
    for(let i=0; i<6; i++) { const img = new Image(); img.src = `images/face_${i}.png`; img.onload = () => { faceImages[i]=img; faceImageReady[i]=true; check(); }; img.onerror = check; }
    for(let i=0; i<11; i++) { const img = new Image(); img.src = `images/obs_${i}.png`; img.onload = () => { obstacleImages[i]=img; obstacleImageReady[i]=true; check(); }; img.onerror = check; }
}

World.add(engine.world, [
    Bodies.rectangle(WIDTH/2, HEIGHT + 25, WIDTH, 50, { isStatic: true, friction: 0.5 }),
    Bodies.rectangle(-15, HEIGHT/2, 30, HEIGHT, { isStatic: true }),
    Bodies.rectangle(WIDTH + 15, HEIGHT/2, 30, HEIGHT, { isStatic: true })
]);

function spawn(x, y, level, isObstacle = false, sizeOverride = null) {
    const radius = isObstacle ? (sizeOverride || 20) : (level + 1) * 16 + 10;
    const body = Bodies.circle(x, y, radius, { 
        restitution: 0.4, friction: 0.1, label: isObstacle ? "obs" : "friend", level: level, 
        obsIndex: Math.floor(Math.random() * 11), render: { visible: false } 
    });
    body.radius = radius;
    if (!isObstacle) Body.setAngle(body, currentAngle);
    World.add(engine.world, body);
    return body;
}

// 修正点：パーティクルの軌道と寿命をよりランダムに
function createEffect(x, y, color, count = 20, speed = 10, decayBase = 0.02) {
    for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const s = Math.random() * speed + 2;
        particles.push({ 
            x, y, 
            vx: Math.cos(ang) * s, 
            vy: Math.sin(ang) * s - (Math.random() * 5), 
            size: Math.random() * 8 + 2, 
            color: color, 
            life: 1.0, 
            decay: Math.random() * 0.03 + decayBase 
        });
    }
}

function pauseGame() {
    if (isGameOver || isPaused || !gameStarted) return;
    isPaused = true; canResume = false; Runner.stop(runner);
    if (audioStatus.bgm) bgm.pause();
    document.getElementById('pause-screen').style.display = 'flex';
    document.getElementById('pause-btn').style.display = 'none';
    setTimeout(() => { canResume = true; }, 500);
    setTimeout(() => { if(isPaused) document.getElementById('restart-btn-small').style.display = 'block'; }, 1000);
}

function resumeGame() {
    if (!isPaused || !canResume) return;
    isPaused = false; Runner.run(runner, engine);
    if (audioStatus.bgm) bgm.play();
    document.getElementById('pause-screen').style.display = 'none';
    document.getElementById('pause-btn').style.display = 'flex';
    document.getElementById('restart-btn-small').style.display = 'none';
}

const handleEnd = () => {
    if (isGameOver || !canDrop || isPaused) return;
    if (!gameStarted) { 
        gameStarted = true; document.getElementById('start-screen').style.display = 'none'; 
        document.getElementById('pause-btn').style.display = 'flex';
        bgm.play().catch(()=>{}); obstacleLoop(); 
    }
    if (!isDragging) return;
    isDragging = false; canDrop = false;
    const body = spawn(currentX, 65, nextQueue.shift());
    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.1);
    nextQueue.push(Math.floor(Math.random() * 3));
    updateUI(); currentAngle = 0;
    setTimeout(() => { canDrop = true; }, 500);
};

Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const { bodyA, bodyB } = pair;
        if (bodyA.label === "friend" && bodyB.label === "friend" && bodyA.level === bodyB.level && !bodyA.isDeleting) {
            const level = bodyA.level; if (level >= 5) return;
            const nx = (bodyA.position.x + bodyB.position.x) / 2, ny = (bodyA.position.y + bodyB.position.y) / 2;
            bodyA.isDeleting = bodyB.isDeleting = true;
            World.remove(engine.world, [bodyA, bodyB]);
            if (level < 4) {
                const nextBody = spawn(nx, ny, level + 1);
                Body.setVelocity(nextBody, { x: (Math.random()-0.5)*4, y: -7 });
                const se = seMerge.cloneNode(); se.play(); createEffect(nx, ny, "#fff", 15, 8);
                score += (level + 1) * 100;
            } else {
                const crown = spawn(nx, ny - 30, 5); crown.isFinal = true;
                Body.setVelocity(crown, { x: (Math.random()-0.5)*15, y: -20 });
                const sef = seFinal.cloneNode(); sef.play(); score += 5000;
                setTimeout(() => {
                    const sed = seDisappear.cloneNode(); sed.play(); activeBigExplosion = true;
                    createEffect(crown.position.x, crown.position.y, "#fff", 100, 20, 0.01);
                    createEffect(crown.position.x, crown.position.y, "#ffeb3b", 100, 22, 0.01);
                    createEffect(crown.position.x, crown.position.y, "#2ecc71", 100, 21, 0.01);
                    setTimeout(() => activeBigExplosion = false, 1500);
                    World.remove(engine.world, crown);
                    Composite.allBodies(engine.world).forEach(b => {
                        if (b.label === "obs" && Vector.magnitude(Vector.sub(b.position, crown.position)) < 250) {
                            World.remove(engine.world, b); score += 500;
                        }
                    });
                }, 1500);
            }
            document.getElementById('score').innerText = score;
        }
    });
});

// 修正点：画像縮尺ロジック（短い方を直径に合わせる）
function drawCoin(ctx, img, radius) {
    if (!img || !img.complete) return;
    const diameter = radius * 2;
    const ratio = img.naturalWidth / img.naturalHeight;
    let dw, dh;
    // 縦横の「短い方」を直径に合わせることで、円からはみ出さず歪まない
    if (ratio > 1) { // 横長画像
        dh = diameter;
        dw = diameter * ratio;
    } else { // 縦長画像
        dw = diameter;
        dh = diameter / ratio;
    }
    ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
}

Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    if (activeBigExplosion) ctx.globalCompositeOperation = 'lighter';
    particles.forEach((p, i) => {
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        if (!isPaused) { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= p.decay; if(p.life <= 0) particles.splice(i, 1); }
    });
    ctx.globalAlpha = 1.0; ctx.globalCompositeOperation = 'source-over';
    
    if (!isGameOver && canDrop && !isPaused) {
        const lv = nextQueue[0], r = (lv + 1) * 16 + 10, img = faceImages[lv];
        if (isDragging) {
            ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(currentX, 65); ctx.lineTo(currentX, HEIGHT);
            ctx.strokeStyle = "rgba(46,204,113,0.3)"; ctx.stroke(); ctx.setLineDash([]);
        }
        ctx.save(); ctx.translate(currentX, 65); ctx.rotate(currentAngle);
        drawCoin(ctx, img, r); ctx.restore();
    }
    Composite.allBodies(engine.world).forEach(b => {
        if (b.label === "friend" || b.label === "obs") {
            const img = (b.label === "obs") ? obstacleImages[b.obsIndex] : faceImages[b.level];
            ctx.save(); ctx.translate(b.position.x, b.position.y); ctx.rotate(b.angle);
            if (b.isFinal) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 20; }
            drawCoin(ctx, img, b.radius); ctx.restore();
        }
    });
});

function obstacleLoop() {
    if (isGameOver || isPaused) { if(isPaused) setTimeout(obstacleLoop, 500); return; }
    let d = timeLeft <= 10 ? 400 : (timeLeft <= 30 ? 900 : 1800);
    if (timeLeft <= 42) spawn(Math.random()*(WIDTH-60)+30, -50, 0, true, 20 + (45-timeLeft)*0.8);
    setTimeout(obstacleLoop, d);
}

setInterval(() => { if(gameStarted && !isGameOver && !isPaused && timeLeft > 0) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft===0) endGame("タイムアップ！", true); } }, 1000);

document.getElementById('pause-btn').addEventListener('touchstart', (e) => e.stopPropagation());
document.getElementById('pause-btn').addEventListener('mousedown', (e) => e.stopPropagation());

function updateX(e) {
    if(isPaused) return;
    const rect = render.canvas.getBoundingClientRect();
    const clientX = e.clientX ?? e.touches?.[0].clientX ?? currentX;
    const newX = Math.max(30, Math.min(WIDTH-30, clientX - rect.left));
    currentAngle += (newX - currentX) * 0.05; currentX = newX;
}

window.addEventListener('mousedown', (e) => { if(!isGameOver && canDrop && !isPaused) { isDragging = true; updateX(e); } });
window.addEventListener('mousemove', updateX);
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', (e) => { if(!isGameOver && canDrop && !isPaused) { isDragging = true; updateX(e); } }, {passive: false});
window.addEventListener('touchmove', (e) => updateX(e), {passive: false});
window.addEventListener('touchend', handleEnd);

function updateUI() {
    [1, 2].forEach(i => {
        const lv = nextQueue[i], imgEl = document.getElementById(`n${i}-img`);
        if (faceImageReady[lv]) { imgEl.src = `images/face_${lv}.png`; imgEl.style.display = "block"; }
    });
}

function endGame(msg, isTime) {
    isGameOver = true; document.getElementById('pause-btn').style.display = 'none';
    if (!isTime) bgm.pause();
    document.getElementById('game-over').style.display='block'; document.getElementById('over-reason').innerText = msg;
    document.getElementById('final-score').innerText = score;
    setTimeout(() => document.getElementById('retry-btn').style.display = 'inline-block', 1500);
}

preloadImages(() => { updateUI(); Render.run(render); Runner.run(runner, engine); });
</script>
</body>
</html>
