<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>つとむゲーム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --base-width: 375px; --base-height: 667px; }
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }
        
        /* --- スタイル修正箇所 --- */
        #game-container { 
            position: relative; 
            width: var(--base-width); 
            height: var(--base-height); 
            /* 背景画像を設定し、その上に上部を暗くするグラデーションを重ねてUIの視認性を確保 */
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 15%, rgba(0,0,0,0) 30%),
                url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden; 
        }
        /* ------------------------ */
        
        #game-container canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
        }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; cursor: pointer; }
        #start-msg { color: #2ecc71; font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #2ecc71; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #score-box { position: absolute; top: 15px; left: 15px; }
        #best-box { position: absolute; top: 15px; left: 100px; }
        #timer-box { position: absolute; top: 15px; left: 55%; transform: translateX(-50%); text-align: center; }
        
        #deadline { position: absolute; top: 110px; width: 100%; height: 2px; border-top: 2px dashed #e74c3c; opacity: 0.4; z-index: 5; }
        #deadline.danger { 
            opacity: 1; 
            border-top: 2px solid #f00; 
            box-shadow: 0 0 15px #f00; 
            animation: blink-red 0.4s infinite; 
        }
        @keyframes blink-red { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        #next-container { position: absolute; top: 35px; right: 10px; width: 85px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 20px; display: flex; align-items: center; justify-content: space-around; border: 1px solid rgba(255,255,255,0.2); }
        .next-item { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .next-image { 
            width: 100%; height: 100%; object-fit: contain; 
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            display: none; 
        }
        .value { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 8px #2ecc71; }
        
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,20,0,0.95); color: white; padding: 40px; border-radius: 20px; text-align: center; display: none; z-index: 1000; border: 3px solid #2ecc71; width: 75%; pointer-events: auto; }
        #retry-btn { 
            display: none; 
            margin-top: 25px; padding: 15px 40px; border-radius: 30px; 
            background: #2ecc71; border: none; font-weight: bold; font-size: 18px; 
            color: #000; cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
            animation: fadeInBtn 0.8s ease-out forwards;
        }
        @keyframes fadeInBtn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="loading">DINO LOADING...</div>
    <div id="start-screen">
        <div id="start-msg">タップしてスタート</div>
        <p style="color: #aaa; margin-top:20px;">青山のことを忘れないでください！</p>
    </div>
    <div id="deadline"></div>
    <div id="ui-layer">
        <div id="score-box"><div style="font-size:10px; color:#aaa;">SCORE</div><div id="score" class="value">0</div></div>
        <div id="best-box"><div style="font-size:10px; color:#aaa;">BEST</div><div id="best-score" class="value" style="color:#2ecc71;">0</div></div>
        <div id="timer-box"><div style="font-size:10px; color:#aaa;">TIME</div><div id="timer" class="value">60</div></div>
        <div id="next-container">
            <div id="n1-box" class="next-item"><img id="n1-img" class="next-image"></div>
            <div id="n2-box" class="next-item" style="opacity: 0.3;"><img id="n2-img" class="next-image"></div>
        </div>
    </div>
    <div id="game-over">
        <div id="new-record" style="display:none; color:#ffeb3b;">✨ NEW RECORD ✨</div>
        <h1 id="over-title" style="margin:0 0 10px 0;">終了</h1>
        <p id="over-reason" style="margin-bottom:20px; color:#ccc;"></p>
        <div id="final-score" class="value" style="font-size:48px;">0</div>
        <button id="retry-btn" onclick="location.reload()">もう一度遊ぶ</button>
    </div>
</div>

<script>
// --- 音源の設定とエラーハンドリング ---
const audioStatus = { bgm: true, rotate: true, merge: true, disappear: true };
const bgm = new Audio('bgm.mp3');
bgm.loop = false;
const seRotate = new Audio('rotate.mp3');
const seMerge = new Audio('merge.mp3');
const seDisappear = new Audio('disappear.mp3');

[
    {a: bgm, id: 'bgm'}, {a: seRotate, id: 'rotate'}, 
    {a: seMerge, id: 'merge'}, {a: seDisappear, id: 'disappear'}
].forEach(item => {
    item.a.addEventListener('error', () => { audioStatus[item.id] = false; });
});

function playSE(audio, id) {
    if (!audioStatus[id]) return;
    const clone = audio.cloneNode();
    clone.play().catch(()=>{});
}

const EMOJIS = ["🥚", "🦴", "🌿", "🦕", "REX", "👑"]; 
const FACE_IMAGE_SOURCES = EMOJIS.map((_, i) => `images/face_${i}.png`);
// 【修正】オジャマ画像をobs_10までの11種類に変更
const OBSTACLE_IMAGE_SOURCES = Array.from({length: 11}, (_, i) => `images/obs_${i}.png`);
const PASSWORD = "968";

if (!sessionStorage.getItem("auth_ok")) {
    const input = prompt("パスワード");
    if (input === PASSWORD) sessionStorage.setItem("auth_ok", "true");
    else { document.body.innerHTML = "Access Denied"; throw new Error(); }
}

const { Engine, Render, Runner, World, Bodies, Events, Composite, Vector, Body } = Matter;
const WIDTH = 375, HEIGHT = 667, LIMIT_Y = 110;
const faceImages = [], faceImageReady = [], obstacleImages = [], obstacleImageReady = [];
let score = 0, highScore = parseInt(localStorage.getItem('suika_high_score')) || 0;
let timeLeft = 60, isGameOver = false, gameStarted = false;
let nextQueue = [0, 0, 0].map(() => Math.floor(Math.random() * 3));

let isDragging = false, currentX = WIDTH/2, currentAngle = 0, lastSoundX = WIDTH/2;
let canDrop = true, overLineStartTime = null;
let particles = []; // 爆発や合体演出用の粒子

const engine = Engine.create();
const render = Render.create({ element: document.getElementById('game-container'), engine: engine, options: { width: WIDTH, height: HEIGHT, wireframes: false, background: 'transparent' } });
// 合体判定を激甘にする
engine.world.gravity.scale *= 1.5; 

function preloadImages(callback) {
    let loaded = 0;
    const total = FACE_IMAGE_SOURCES.length + OBSTACLE_IMAGE_SOURCES.length;
    const check = () => { if (++loaded === total) { document.getElementById('loading').style.display='none'; callback(); } };
    FACE_IMAGE_SOURCES.forEach((src, i) => { const img = new Image(); img.src = src; img.onload = () => { faceImages[i]=img; faceImageReady[i]=true; check(); }; img.onerror = () => { faceImageReady[i]=false; check(); }; });
    OBSTACLE_IMAGE_SOURCES.forEach((src, i) => { const img = new Image(); img.src = src; img.onload = () => { obstacleImages[i]=img; obstacleImageReady[i]=true; check(); }; img.onerror = () => { obstacleImageReady[i]=false; check(); }; });
}

World.add(engine.world, [
    Bodies.rectangle(WIDTH/2, HEIGHT + 25, WIDTH, 50, { isStatic: true, friction: 0.5 }),
    Bodies.rectangle(-15, HEIGHT/2, 30, HEIGHT, { isStatic: true }),
    Bodies.rectangle(WIDTH + 15, HEIGHT/2, 30, HEIGHT, { isStatic: true })
]);

function spawn(x, y, level, isObstacle = false, sizeOverride = null) {
    const radius = isObstacle ? (sizeOverride || 20) : (level + 1) * 16 + 10;
    const body = Bodies.circle(x, y, radius, { 
        restitution: 0.4, friction: 0.1, slop: 0,
        label: isObstacle ? "obs" : "friend", 
        level: level, 
        // 【修正】オジャマのランダム範囲を配列長に合わせる
        obsIndex: Math.floor(Math.random() * OBSTACLE_IMAGE_SOURCES.length),
        render: { visible: false } 
    });
    body.radius = radius;
    if (!isObstacle) Body.setAngle(body, currentAngle);
    World.add(engine.world, body);
    return body;
}

// パーティクル生成（エフェクト）
function createEffect(x, y, color, count = 20, speed = 10) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed - (speed/4),
            size: Math.random()*6+2, color: color, life: 1.0, 
            decay: Math.random()*0.02 + 0.02
        });
    }
}

function updateUI() {
    [1, 2].forEach(i => {
        const level = nextQueue[i], imgEl = document.getElementById(`n${i}-img`);
        if (faceImageReady[level]) { imgEl.src = FACE_IMAGE_SOURCES[level]; imgEl.style.display = "block"; }
    });
    document.getElementById('score').innerText = score;
    document.getElementById('best-score').innerText = highScore;
}

const handleEnd = () => {
    if (isGameOver || !canDrop) return;
    if (!gameStarted) { 
        gameStarted = true; 
        document.getElementById('start-screen').style.display = 'none'; 
        if (audioStatus.bgm) bgm.play().catch(()=>{}); 
        obstacleLoop(); 
    }
    if (!isDragging) return;
    isDragging = false; canDrop = false;
    spawn(currentX, 65, nextQueue.shift());
    nextQueue.push(Math.floor(Math.random() * 3));
    updateUI();
    currentAngle = 0;
    setTimeout(() => { canDrop = true; }, 500);
};

// 合体・スコア処理
Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const { bodyA, bodyB } = pair;
        if (bodyA.label === "friend" && bodyB.label === "friend" && bodyA.level === bodyB.level && !bodyA.isDeleting && !bodyB.isDeleting) {
            const level = bodyA.level;
            if (level >= 5) return;
            const nx = (bodyA.position.x + bodyB.position.x) / 2;
            const ny = (bodyA.position.y + bodyB.position.y) / 2;
            bodyA.isDeleting = bodyB.isDeleting = true;
            World.remove(engine.world, [bodyA, bodyB]);
            
            if (level < 4) { 
                spawn(nx, ny, level + 1); 
                // ゲーム終了後はスコアを加算しない
                if (!isGameOver) {
                    playSE(seMerge, 'merge');
                    // 合体演出：白いピクセル粒子を出す
                    createEffect(nx, ny, "#ffffff", 15, 8);
                    score += (level + 1) * 100; 
                    document.getElementById('score').innerText = score;
                }
            }
            else {
                const crown = spawn(nx, ny - 30, 5); crown.isFinal = true;
                Body.setVelocity(crown, { x: (Math.random()-0.5)*15, y: -25 });
                Body.setAngularVelocity(crown, (Math.random() - 0.5) * 0.3);
                if (!isGameOver) {
                    playSE(seMerge, 'merge');
                    // 合体演出：白いピクセル粒子を出す
                    createEffect(nx, ny, "#ffffff", 15, 8);
                    score += 5000;
                    document.getElementById('score').innerText = score;
                }
                
                setTimeout(() => {
                    playSE(seDisappear, 'disappear');
                    // 王冠爆発演出：カラフルな粒子
                    createEffect(crown.position.x, crown.position.y, `hsl(${Math.random()*360}, 80%, 60%)`, 60, 20);
                    World.remove(engine.world, crown);
                    Composite.allBodies(engine.world).forEach(b => {
                        if (b.label === "obs" && Vector.magnitude(Vector.sub(b.position, crown.position)) < 250) {
                            World.remove(engine.world, b); 
                            // 爆発のラグ中にゲームが終わった場合も加算しない
                            if (!isGameOver) {
                                score += 500;
                                document.getElementById('score').innerText = score;
                            }
                        }
                    });
                }, 1500);
            }
        }
    });
});

Events.on(engine, 'afterUpdate', () => {
    if (isGameOver || !gameStarted) return;
    particles.forEach((p, i) => { 
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay; 
        if(p.life <= 0) particles.splice(i, 1); 
    });
    const bodies = Composite.allBodies(engine.world);
    let highestY = 999;
    bodies.forEach(b => { if (!b.isStatic && b.position.y > 80 && !b.isFinal) highestY = Math.min(highestY, b.position.y); });
    const dl = document.getElementById('deadline');
    if (highestY < LIMIT_Y) {
        dl.classList.add('danger');
        if (!overLineStartTime) overLineStartTime = Date.now();
        if ((Date.now() - overLineStartTime) / 1000 > 3) endGame("絶滅しました...", false);
    } else { dl.classList.remove('danger'); overLineStartTime = null; }
});

function endGame(reason, isTimeUp) {
    if (isGameOver) return;
    isGameOver = true; // ここでフラグが立つため、以降のスコア加算が止まる
    if (!isTimeUp) { bgm.pause(); bgm.currentTime = 0; }
    if (score > highScore) { highScore = score; localStorage.setItem('suika_high_score', highScore); document.getElementById('new-record').style.display='block'; }
    
    document.getElementById('game-over').style.display='block';
    document.getElementById('over-reason').innerText = reason;
    document.getElementById('final-score').innerText = score;

    setTimeout(() => {
        document.getElementById('retry-btn').style.display = 'inline-block';
    }, 1500);
}

Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    // パーティクルの描画（ピクセル四角形）
    particles.forEach(p => { 
        ctx.fillStyle = p.color; 
        ctx.globalAlpha = p.life; 
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size); 
    });
    ctx.globalAlpha = 1.0;
    
    // 【ドット絵対策・縮尺維持】プレビュー画像の描画ロジック
    if (!isGameOver && canDrop) {
        const lv = nextQueue[0];
        const radius = (lv + 1) * 16 + 10;
        const targetSize = radius * 2.2; // ターゲットとなる「最大」サイズ
        const img = faceImages[lv];

        if (isDragging) { ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(currentX, 65); ctx.lineTo(currentX, HEIGHT); ctx.strokeStyle = "rgba(46,204,113,0.3)"; ctx.stroke(); ctx.setLineDash([]); }
        
        ctx.save();
        ctx.translate(currentX, 65);
        ctx.rotate(currentAngle);

        if (img && img.complete) {
            // アスペクト比を維持して拡大
            const originalAspectRatio = img.naturalWidth / img.naturalHeight;
            let dw, dh;
            if (originalAspectRatio > 1) {
                // 横長
                dw = targetSize;
                dh = targetSize / originalAspectRatio;
            } else if (originalAspectRatio < 1) {
                // 縦長
                dh = targetSize;
                dw = targetSize * originalAspectRatio;
            } else {
                // 正方形
                dw = targetSize;
                dh = targetSize;
            }
            ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
        } else {
            // 画像がない場合はテキストでアスペクト比計算なし
            ctx.font = `${targetSize}px Arial`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(EMOJIS[lv], 0, 0);
        }
        ctx.restore();
    }
    
    // 【ドット絵対策・縮尺維持】物理オブジェクトの描画ロジック
    Composite.allBodies(engine.world).forEach(b => {
        if (b.label === "friend" || b.label === "obs") {
            const radius = b.radius;
            const targetSize = radius * 2.2;
            const img = (b.label === "obs") ? obstacleImages[b.obsIndex] : faceImages[b.level];

            ctx.save();
            ctx.translate(b.position.x, b.position.y);
            ctx.rotate(b.angle);

            if (b.isFinal) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 30 + Math.sin(Date.now()/100)*15; } 

            if (img && img.complete) {
                // アスペクト比を維持して拡大
                const originalAspectRatio = img.naturalWidth / img.naturalHeight;
                let dw, dh;
                if (originalAspectRatio > 1) { dw = targetSize; dh = targetSize / originalAspectRatio; }
                else if (originalAspectRatio < 1) { dh = targetSize; dw = targetSize * originalAspectRatio; }
                else { dw = targetSize; dh = targetSize; }
                ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
            } else {
                // 画像がない場合はテキストでそのまま
                if (b.label === "obs") { ctx.font=`${targetSize}px Arial`; ctx.fillText("💣", 0, 0); }
                else { ctx.font=`${targetSize}px Arial`; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(EMOJIS[b.level], 0, 0); }
            }
            ctx.restore();
        }
    });
});

function obstacleLoop() {
    if (isGameOver) return;
    let d = timeLeft <= 10 ? 360 : (timeLeft <= 40 ? 1000 : 3000);
    let size = 20 + (60 - timeLeft) * 0.6;
    if (timeLeft <= 55) spawn(Math.random()*(WIDTH-60)+30, -50, 0, true, size);
    setTimeout(obstacleLoop, d);
}

setInterval(() => { if(gameStarted && !isGameOver && timeLeft > 0) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft===0) endGame("ゲームクリア！", true); } }, 1000);

function updateX(e) { 
    const rect = render.canvas.getBoundingClientRect(); 
    const clientX = e.clientX ?? e.touches?.[0].clientX ?? currentX;
    const newX = Math.max(30, Math.min(WIDTH-30, clientX - rect.left));
    const diff = newX - currentX;
    currentAngle += diff * 0.05;
    currentX = newX;
    if (Math.abs(currentX - lastSoundX) > 15) {
        playSE(seRotate, 'rotate');
        lastSoundX = currentX;
    }
}

window.addEventListener('mousedown', (e) => { if(!isGameOver && canDrop) { isDragging = true; lastSoundX = currentX; updateX(e); } });
window.addEventListener('mousemove', (e) => { if(isDragging) updateX(e); });
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', (e) => { if(!isGameOver && canDrop) { isDragging = true; lastSoundX = currentX; updateX(e); } }, {passive: false});
window.addEventListener('touchmove', (e) => { if(isDragging) updateX(e); }, {passive: false});
window.addEventListener('touchend', handleEnd);

preloadImages(() => { updateUI(); Render.run(render); Runner.run(Runner.create(), engine); });
</script>
</body>
</html>
