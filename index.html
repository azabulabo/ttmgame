<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送別会スイカ - 激闘SE Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --base-width: 375px; --base-height: 667px; }
        body { 
            margin: 0; padding: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
        }
        #game-container {
            position: relative;
            width: var(--base-width);
            height: var(--base-height);
            background: linear-gradient(180deg, #2c3e50 0%, #000 100%);
            overflow: hidden;
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score-box { position: absolute; top: 20px; left: 15px; }
        #timer-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; }
        #next-box { 
            position: absolute; top: 20px; right: 10px; 
            width: 60px; height: 140px; background: rgba(255,255,255,0.15);
            border-radius: 12px; text-align: center; backdrop-filter: blur(5px);
        }
        .label { font-size: 10px; color: #aaa; letter-spacing: 1px; }
        .value { font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        #timer.warning { color: #e74c3c; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .next-emoji { font-size: 32px; margin: 5px 0; display: block; }
        .half-visible { opacity: 0.3; transform: scale(0.8); }

        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); color: white; padding: 30px;
            border-radius: 20px; text-align: center; display: none; z-index: 20; border: 2px solid #f1c40f;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="score-box">
            <div class="label">SCORE</div>
            <div id="score" class="value">0</div>
        </div>
        <div id="timer-box">
            <div class="label">TIME LEFT</div>
            <div id="timer" class="value">60</div>
        </div>
        <div id="next-box">
            <div class="label" style="margin-top:5px">NEXT</div>
            <div id="next1" class="next-emoji"></div>
            <div id="next2" class="next-emoji"></div>
            <div id="next3" class="next-emoji half-visible"></div>
        </div>
    </div>
    <div id="game-over">
        <h1 style="color:#f1c40f">TIME UP!</h1>
        <p>送別会スコア</p>
        <div id="final-score" style="font-size:48px; font-weight:bold; margin:20px 0;">0</div>
        <button onclick="location.reload()" style="padding:12px 24px; background:#f1c40f; border:none; border-radius:50px; font-weight:bold; cursor:pointer;">リベンジする</button>
    </div>
</div>

<script>
const PASSWORD = "968";
if (prompt("パスワードを入力 (968)") !== PASSWORD) {
    document.body.innerHTML = "<h1>Access Denied</h1>";
    throw new Error();
}

const { Engine, Render, Runner, World, Bodies, Events, Composite, Body } = Matter;

const WIDTH = 375;
const HEIGHT = 667;
const EMOJIS = ["😀", "😊", "😎", "🤩", "🥳", "😇", "👑"];
const OBSTACLE = "💣";

let score = 0;
let timeLeft = 60;
let isGameOver = false;
let nextQueue = [Math.floor(Math.random()*3), Math.floor(Math.random()*3), Math.floor(Math.random()*3)];

const engine = Engine.create();
const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: { width: WIDTH, height: HEIGHT, wireframes: false, background: 'transparent' }
});

// 壁の設定
const wallOptions = { isStatic: true, render: { fillStyle: '#34495e' }, friction: 0.5 };
World.add(engine.world, [
    Bodies.rectangle(WIDTH/2, HEIGHT + 30, WIDTH, 60, wallOptions),
    Bodies.rectangle(-15, HEIGHT/2, 30, HEIGHT, wallOptions),
    Bodies.rectangle(WIDTH + 15, HEIGHT/2, 30, HEIGHT, wallOptions)
]);

function spawn(x, y, level, isObstacle = false, customRadius = null) {
    const radius = isObstacle ? (customRadius || 20) : (level + 1) * 16 + 4;
    const body = Bodies.circle(x, y, radius, {
        restitution: 0.3,
        friction: 0.1,
        label: isObstacle ? "obs" : "friend",
        level: level,
        render: { visible: false }
    });
    body.radius = radius;
    body.emoji = isObstacle ? OBSTACLE : EMOJIS[level];
    World.add(engine.world, body);
    return body;
}

function updateUI() {
    document.getElementById('next1').innerText = EMOJIS[nextQueue[0]];
    document.getElementById('next2').innerText = EMOJIS[nextQueue[1]];
    document.getElementById('next3').innerText = EMOJIS[nextQueue[2]];
    document.getElementById('score').innerText = score;
}

// 落下操作
let canDrop = true;
const handleInput = (e) => {
    if (!canDrop || isGameOver || timeLeft <= 0) return;
    const rect = render.canvas.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const x = Math.max(30, Math.min(WIDTH - 30, clientX - rect.left));

    spawn(x, 50, nextQueue.shift());
    nextQueue.push(Math.floor(Math.random() * 3));
    updateUI();

    canDrop = false;
    setTimeout(() => { canDrop = true; }, 500);
};

render.canvas.addEventListener('mousedown', handleInput);
render.canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); });

// 合体
Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const { bodyA, bodyB } = pair;
        if (bodyA.label === "friend" && bodyB.label === "friend" && bodyA.level === bodyB.level) {
            if (bodyA.level < EMOJIS.length - 1) {
                const nx = (bodyA.position.x + bodyB.position.x) / 2;
                const ny = (bodyA.position.y + bodyB.position.y) / 2;
                const newLevel = bodyA.level + 1;
                World.remove(engine.world, [bodyA, bodyB]);
                spawn(nx, ny, newLevel);
                score += (newLevel + 1) * 15;
                document.getElementById('score').innerText = score; // スコア即時更新
            }
        }
    });
});

// 描画（回転対応）
Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    Composite.allBodies(engine.world).forEach(b => {
        if (b.emoji) {
            ctx.save();
            ctx.translate(b.position.x, b.position.y);
            ctx.rotate(b.angle);
            ctx.font = `${b.radius * 2.2}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(b.emoji, 0, 0);
            ctx.restore();
        }
    });
});

// タイマーとゲームオーバー
const timerInterval = setInterval(() => {
    if (isGameOver) return;
    timeLeft--;
    const timerEl = document.getElementById('timer');
    timerEl.innerText = timeLeft;
    
    if (timeLeft <= 10) timerEl.classList.add('warning');

    if (timeLeft <= 0) {
        isGameOver = true;
        clearInterval(timerInterval);
        document.getElementById('game-over').style.display = 'block';
        document.getElementById('final-score').innerText = score;
    }
}, 1000);

// --- オジャマ激化ロジック ---
function obstacleLoop() {
    if (isGameOver) return;

    let delay = 3000; // 初期3秒
    let count = 1;
    let size = 20;

    if (timeLeft > 40) {
        // 序盤: 3秒に1回 小サイズ
        delay = 3000;
        count = 1;
    } else if (timeLeft > 10) {
        // 中盤: 徐々に加速 1.5秒〜0.5秒に1回
        delay = 500 + (timeLeft - 10) * 50; 
        size = 20 + (40 - timeLeft); // 徐々に大きく
    } else {
        // ラスト10秒: 絶望モード
        delay = 166; // 1秒間に約6回
        count = 1;
        size = 25 + Math.random() * 25; // まあまあの大きさも混ざる
    }

    // 実行
    for(let i=0; i<count; i++){
        spawn(Math.random() * (WIDTH - 60) + 30, -50, 0, true, size);
    }

    setTimeout(obstacleLoop, delay);
}
obstacleLoop(); // ループ開始

updateUI();
Render.run(render);
Runner.run(Runner.create(), engine);

</script>
</body>
</html>
