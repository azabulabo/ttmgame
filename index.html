<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>つとむゲーム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --base-width: 375px; --base-height: 667px; }
        body { margin: 0; padding: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; touch-action: none; }
        
        #game-container { 
            position: relative; 
            width: var(--base-width); 
            height: var(--base-height); 
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 15%, rgba(0,0,0,0) 30%),
                url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden; 
        }
        
        #game-container canvas { image-rendering: pixelated; }

        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }
        #start-screen { background: rgba(0,0,0,0.85); }
        #pause-screen { background: rgba(0,0,0,0.7); display: none; }

        .blink-msg { color: #2ecc71; font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #2ecc71; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 75px; 
            padding: 10px 15px; box-sizing: border-box;
            display: flex; align-items: flex-start; 
            justify-content: space-between;
            pointer-events: none; z-index: 10;
        }
        
        .ui-group { display: flex; flex-direction: column; justify-content: center; margin-top: 5px; }
        .label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
        .value { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 0 0 8px #2ecc71; line-height: 1; }

        #right-controls { display: flex; align-items: flex-end; pointer-events: auto; }
        
        #next-wrapper {
            display: flex; flex-direction: column; align-items: flex-start; margin-right: 12px;
        }

        .next-label {
            font-size: 11px; font-weight: bold; color: #fff; text-shadow: 0 0 8px #2ecc71;
            margin-bottom: 3px; margin-left: 8px; 
        }

        #next-container { 
            width: 70px; height: 35px; background: rgba(255,255,255,0.1); 
            border-radius: 10px; display: flex; align-items: center; justify-content: space-around; 
            border: 1px solid rgba(255,255,255,0.2);
        }
        .next-item { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .next-image { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: none; }

        #pause-btn { 
            background: none; border: none; color: white; 
            font-size: 22px; cursor: pointer; padding: 5px; margin-bottom: -3px; 
            text-shadow: 0 0 8px #2ecc71; transition: opacity 0.2s;
        }

        .delayed-btn { margin-top: 80px; padding: 10px 20px; background: none; border: 1px solid #666; color: #888; border-radius: 20px; font-size: 14px; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #retry-btn { margin-top: 25px; padding: 15px 40px; border-radius: 30px; background: #2ecc71; border: none; font-weight: bold; font-size: 18px; color: #000; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.5s; }

        #deadline { position: absolute; top: 110px; width: 100%; height: 2px; border-top: 2px dashed #e74c3c; opacity: 0.4; z-index: 5; }
        #deadline.danger { opacity: 1; border-top: 2px solid #f00; box-shadow: 0 0 15px #f00; animation: blink-red 0.4s infinite; }
        
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,20,0,0.95); color: white; padding: 40px; border-radius: 20px; text-align: center; display: none; z-index: 1000; border: 3px solid #2ecc71; width: 75%; pointer-events: auto; }
        #close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa; transition: color 0.2s; }
        #close-modal:hover { color: #fff; }

        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 200; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="loading">LOADING...</div>
    
    <div id="start-screen" class="overlay-screen">
        <div class="blink-msg">タップしてスタート</div>
        <p style="color: #aaa; margin-top:20px;">青山のことを忘れないでください！</p>
    </div>

    <div id="pause-screen" class="overlay-screen" onclick="resumeGame(event)">
        <div class="blink-msg">タップして再開</div>
        <button id="restart-btn-small" class="delayed-btn" onclick="location.reload()">最初からやり直し</button>
    </div>

    <div id="ui-layer">
        <div class="ui-group">
            <div class="label">SCORE</div>
            <div id="score" class="value">0</div>
        </div>
        <div class="ui-group">
            <div class="label">BEST</div>
            <div id="best-score" class="value" style="color:#2ecc71;">0</div>
        </div>
        <div class="ui-group" style="text-align: center;">
            <div class="label">TIME</div>
            <div id="timer" class="value">45</div>
        </div>
        <div id="right-controls">
            <div id="next-wrapper">
                <div class="next-label">Next</div>
                <div id="next-container">
                    <div id="n1-box" class="next-item"><img id="n1-img" class="next-image"></div>
                    <div id="n2-box" class="next-item" style="opacity: 0.3;"><img id="n2-img" class="next-image"></div>
                </div>
            </div>
            <button id="pause-btn" onclick="pauseGame()">⏸</button>
        </div>
    </div>

    <div id="deadline"></div>
    
    <div id="game-over">
        <span id="close-modal" onclick="toggleModal(event, false)">×</span>
        <div id="new-record" style="display:none; color:#ffeb3b;">✨ NEW RECORD ✨</div>
        <h1 id="over-title" style="margin:0 0 10px 0;">ありがとう</h1>
        <p id="over-reason" style="margin-bottom:20px; color:#ccc;"></p>
        <div id="final-score" class="value" style="font-size:48px;">0</div>
        <button id="retry-btn" onclick="location.reload()">もういちど！</button>
    </div>
</div>

<script>
const audioStatus = { bgm: true, rotate: true, merge: true, merge1: true, disappear: true, final: true };
const bgm = new Audio('bgm.mp3'); bgm.loop = false;
const seRotate = new Audio('rotate.mp3');
const seMerge = new Audio('merge.mp3');
const seMerge1 = new Audio('merge1.mp3');
const seDisappear = new Audio('disappear.mp3');
const seFinal = new Audio('final.mp3');

[{a: bgm, id: 'bgm'}, {a: seRotate, id: 'rotate'}, {a: seMerge, id: 'merge'}, {a: seMerge1, id: 'merge1'}, {a: seDisappear, id: 'disappear'}, {a: seFinal, id: 'final'}]
.forEach(item => { item.a.addEventListener('error', () => { audioStatus[item.id] = false; }); });

function playSE(audio, id) { if (!audioStatus[id]) return; const clone = audio.cloneNode(); clone.play().catch(()=>{}); }

const PASSWORD = "968";
if (!sessionStorage.getItem("auth_ok")) {
    const input = prompt("パスワードを入力してください（半角数字3ケタ）");
    if (input === PASSWORD) sessionStorage.setItem("auth_ok", "true");
    else { document.body.innerHTML = "Access Denied"; throw new Error(); }
}

const { Engine, Render, Runner, World, Bodies, Events, Composite, Vector, Body } = Matter;
const WIDTH = 375, HEIGHT = 667, LIMIT_Y = 110;
const faceImages = [], obstacleImages = [], faceImageReady = [], obstacleImageReady = [];
let score = 0, highScore = parseInt(localStorage.getItem('suika_high_score')) || 0;
let timeLeft = 45, isGameOver = false, gameStarted = false, isPaused = false, canResume = false;
let nextQueue = [0, 0, 0].map(() => Math.floor(Math.random() * 3));
let isDragging = false, currentX = WIDTH/2, currentAngle = 0, lastSoundX = WIDTH/2, canDrop = true, overLineStartTime = null;
let particles = [], floatingTexts = [], activeBigExplosion = false;

const engine = Engine.create();
const runner = Runner.create();
const render = Render.create({ element: document.getElementById('game-container'), engine: engine, options: { width: WIDTH, height: HEIGHT, wireframes: false, background: 'transparent' } });
engine.world.gravity.scale *= 1.5; 

function preloadImages(callback) {
    let loaded = 0; const total = 17;
    const check = () => { if (++loaded === total) { document.getElementById('loading').style.display='none'; callback(); } };
    for(let i=0; i<6; i++) { const img = new Image(); img.src = `images/face_${i}.png`; img.onload = () => { faceImages[i]=img; faceImageReady[i]=true; check(); }; img.onerror = check; }
    for(let i=0; i<14; i++) { const img = new Image(); img.src = `images/obs_${i}.png`; img.onload = () => { obstacleImages[i]=img; obstacleImageReady[i]=true; check(); }; img.onerror = check; }
}

World.add(engine.world, [
    Bodies.rectangle(WIDTH/2, HEIGHT + 25, WIDTH, 50, { isStatic: true, friction: 0.5 }),
    Bodies.rectangle(-15, HEIGHT/2, 30, HEIGHT, { isStatic: true }),
    Bodies.rectangle(WIDTH + 15, HEIGHT/2, 30, HEIGHT, { isStatic: true })
]);

function spawn(x, y, level, isObstacle = false, sizeOverride = null) {
    const radius = isObstacle ? (sizeOverride || 20) : (level + 1) * 16 + 10;
    const body = Bodies.circle(x, y, radius, { restitution: 0.4, friction: 0.1, label: isObstacle ? "obs" : "friend", level: level, obsIndex: Math.floor(Math.random() * 11), render: { visible: false } });
    body.radius = radius;
    if (!isObstacle) Body.setAngle(body, currentAngle);
    World.add(engine.world, body);
    return body;
}

function createEffect(x, y, color, count = 20, speed = 10, decayBase = 0.02) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const force = Math.random() * speed;
        particles.push({ x, y, vx: Math.cos(angle) * force, vy: Math.sin(angle) * force - (speed/4), size: Math.random()*6+2, color: color, life: 1.0, decay: Math.random()*0.02 + decayBase });
    }
}

function addFloatingText(x, y, text, isBig = false) {
    floatingTexts.push({ x, y, text, life: 1.0, isBig });
}

function updateUI() {
    [1, 2].forEach(i => {
        const level = nextQueue[i], imgEl = document.getElementById(`n${i}-img`);
        if (faceImageReady[level]) { imgEl.src = `images/face_${level}.png`; imgEl.style.display = "block"; }
    });
    document.getElementById('score').innerText = score;
    document.getElementById('best-score').innerText = highScore;
}

function pauseGame() {
    if (isGameOver || isPaused || !gameStarted) return;
    isPaused = true; canResume = false;
    isDragging = false; 
    Runner.stop(runner);
    if (audioStatus.bgm) bgm.pause();
    document.getElementById('pause-screen').style.display = 'flex';
    document.getElementById('right-controls').style.pointerEvents = 'none';
    document.getElementById('pause-btn').style.opacity = '0';
    setTimeout(() => { canResume = true; }, 500);
    setTimeout(() => { 
        if(isPaused) {
            const btn = document.getElementById('restart-btn-small');
            btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
        }
    }, 1000);
}

function resumeGame(e) {
    if (!isPaused || !canResume) return;
    if (e) e.stopPropagation();
    isPaused = false;
    currentX = WIDTH / 2;
    currentAngle = 0;
    isDragging = false; 
    canDrop = false; 
    setTimeout(() => { if(!isPaused) canDrop = true; }, 300);
    Runner.run(runner, engine);
    if (audioStatus.bgm) bgm.play();
    document.getElementById('pause-screen').style.display = 'none';
    document.getElementById('right-controls').style.pointerEvents = 'auto';
    document.getElementById('pause-btn').style.opacity = '1';
    const btn = document.getElementById('restart-btn-small');
    btn.style.opacity = '0'; btn.style.pointerEvents = 'none';
}

function toggleModal(e, show) {
    if (e) e.stopPropagation();
    document.getElementById('game-over').style.display = show ? 'block' : 'none';
}

const handleEnd = () => {
    if (isGameOver) {
        if (document.getElementById('game-over').style.display === 'none') {
            toggleModal(null, true);
        }
        return;
    }
    if (!canDrop || isPaused) return;
    if (!gameStarted) { 
        gameStarted = true; 
        document.getElementById('start-screen').style.display = 'none'; 
        document.getElementById('pause-btn').style.display = 'block'; 
        if (audioStatus.bgm) bgm.play().catch(()=>{}); 
        obstacleLoop(); 
    }
    if (!isDragging) return;
    isDragging = false; canDrop = false;
    const body = spawn(currentX, 65, nextQueue.shift());
    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.08);
    nextQueue.push(Math.floor(Math.random() * 3));
    updateUI(); currentAngle = 0;
    setTimeout(() => { canDrop = true; }, 500);
};

Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const { bodyA, bodyB } = pair;
        if (bodyA.label === "friend" && bodyB.label === "friend" && bodyA.level === bodyB.level && !bodyA.isDeleting && !bodyB.isDeleting) {
            const level = bodyA.level; if (level >= 5) return;
            const nx = (bodyA.position.x + bodyB.position.x) / 2, ny = (bodyA.position.y + bodyB.position.y) / 2;
            bodyA.isDeleting = bodyB.isDeleting = true;
            World.remove(engine.world, [bodyA, bodyB]);
            if (level < 4) { 
                const nextBody = spawn(nx, ny, level + 1); 
                Body.setVelocity(nextBody, { x: (Math.random() - 0.5) * 3, y: -7 });
                if (!isGameOver) { 
                    if (level === 3) playSE(seMerge1, 'merge1');
                    else playSE(seMerge, 'merge');
                    createEffect(nx, ny, "#ffffff", 15, 8);
                    const gain = (level + 1) * 100;
                    score += gain;
                    addFloatingText(nx, ny, `+${gain}`);
                    document.getElementById('score').innerText = score; 
                }
            } else {
                const crown = spawn(nx, ny - 30, 5); crown.isFinal = true;
                Body.setVelocity(crown, { x: (Math.random()-0.5)*15, y: -14 });
                if (!isGameOver) { 
                    playSE(seFinal, 'final'); 
                    createEffect(nx, ny, "#ffffff", 25, 12); 
                    score += 5000; 
                    addFloatingText(nx, ny, `+5000`, true);
                    document.getElementById('score').innerText = score; 
                }
                setTimeout(() => {
                    playSE(seDisappear, 'disappear'); activeBigExplosion = true;
                    const ex = crown.position.x, ey = crown.position.y;
                    createEffect(ex, ey, "#ffffff", 150, 25, 0.01); 
                    createEffect(ex, ey, "#ffeb3b", 150, 28, 0.01); 
                    createEffect(ex, ey, "#2ecc71", 150, 26, 0.01); 
                    setTimeout(() => activeBigExplosion = false, 1500);
                    World.remove(engine.world, crown);
                    Composite.allBodies(engine.world).forEach(b => { 
                        if (b.label === "obs" && Vector.magnitude(Vector.sub(b.position, crown.position)) < 250) { 
                            World.remove(engine.world, b); 
                            if (!isGameOver) {
                                score += 500;
                                addFloatingText(b.position.x, b.position.y, `+500`);
                            }
                        } 
                    });
                }, 1500);
            }
        }
    });
});

Events.on(engine, 'afterUpdate', () => {
    if (isGameOver || !gameStarted || isPaused) return;
    particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay; if(p.life <= 0) particles.splice(i, 1); });
    
    floatingTexts.forEach((ft, i) => {
        ft.y -= 1.2;
        ft.life -= 0.015;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    });

    const bodies = Composite.allBodies(engine.world);
    let highestY = 999;
    bodies.forEach(b => { if (!b.isStatic && b.position.y > 80 && !b.isFinal) highestY = Math.min(highestY, b.position.y); });
    const dl = document.getElementById('deadline');
    if (highestY < LIMIT_Y) {
        dl.classList.add('danger');
        if (!overLineStartTime) overLineStartTime = Date.now();
        if ((Date.now() - overLineStartTime) / 1000 > 3) endGame("いっぱいになった...", false);
    } else { dl.classList.remove('danger'); overLineStartTime = null; }
});

function endGame(reason, isTimeUp) {
    if (isGameOver) return; isGameOver = true;
    document.getElementById('pause-btn').style.display = 'none';
    if (!isTimeUp && audioStatus.bgm) { bgm.pause(); bgm.currentTime = 0; }
    if (score > highScore) { highScore = score; localStorage.setItem('suika_high_score', highScore); document.getElementById('new-record').style.display='block'; }
    toggleModal(null, true);
    document.getElementById('over-reason').innerText = reason;
    document.getElementById('final-score').innerText = score;
    setTimeout(() => { 
        const btn = document.getElementById('retry-btn');
        btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
    }, 1500);
}

function drawCoin(ctx, img, targetDiameter) {
    if (!img || !img.complete || img.naturalWidth === 0) return;
    const imgW = img.naturalWidth, imgH = img.naturalHeight, ratio = imgW / imgH;
    let dw, dh;
    if (imgW > imgH) { dh = targetDiameter; dw = targetDiameter * ratio; }
    else { dw = targetDiameter; dh = targetDiameter / ratio; }
    ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
}

Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    
    // パーティクル描画
    if (activeBigExplosion) ctx.globalCompositeOperation = 'lighter';
    particles.forEach(p => { 
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life; 
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1.0; ctx.globalCompositeOperation = 'source-over';
    
    // コイン・障害物描画
    if (gameStarted && !isGameOver && !isPaused && canDrop) {
        const lv = nextQueue[0], radius = (lv + 1) * 16 + 10, targetSize = radius * 2, img = faceImages[lv];
        if (isDragging) { 
            ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(currentX, 65); ctx.lineTo(currentX, HEIGHT); 
            ctx.strokeStyle = "rgba(46,204,113,0.3)"; ctx.stroke(); ctx.setLineDash([]); 
        }
        ctx.save(); ctx.translate(currentX, 65); ctx.rotate(currentAngle);
        drawCoin(ctx, img, targetSize); ctx.restore();
    }
    
    Composite.allBodies(engine.world).forEach(b => {
        if (b.label === "friend" || b.label === "obs") {
            const targetSize = b.radius * 2, img = (b.label === "obs") ? obstacleImages[b.obsIndex] : faceImages[b.level];
            ctx.save(); ctx.translate(b.position.x, b.position.y); ctx.rotate(b.angle);
            if (b.isFinal) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 30 + Math.sin(Date.now()/100)*15; } 
            drawCoin(ctx, img, targetSize); ctx.restore();
        }
    });

    //
    floatingTexts.forEach(ft => {
        ctx.save();
        ctx.globalAlpha = ft.life;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        const fontSize = ft.isBig ? '60px' : '34px';
        ctx.font = `bold ${fontSize} sans-serif`;
        
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 6;
        ctx.strokeText(ft.text, ft.x, ft.y);
        
        ctx.fillStyle = '#ffffff';
        ctx.fillText(ft.text, ft.x, ft.y);
        
        ctx.shadowColor = '#2ecc71';
        ctx.shadowBlur = 15;
        ctx.fillText(ft.text, ft.x, ft.y);
        
        ctx.restore();
    });
});

function obstacleLoop() {
    if (isGameOver || isPaused) { if(isPaused) setTimeout(obstacleLoop, 500); return; }
    let d = timeLeft <= 10 ? 300 : (timeLeft <= 30 ? 800 : 1800);
    let size = 20 + (45 - timeLeft) * 0.8; 
    if (timeLeft <= 42) spawn(Math.random()*(WIDTH-60)+30, -50, 0, true, size);
    setTimeout(obstacleLoop, d);
}

setInterval(() => { if(gameStarted && !isGameOver && !isPaused && timeLeft > 0) { timeLeft--; document.getElementById('timer').innerText = timeLeft; if(timeLeft===0) endGame("タイムアップ！", true); } }, 1000);

const interactiveEls = ['restart-btn-small', 'retry-btn', 'close-modal'];
interactiveEls.forEach(id => {
    const el = document.getElementById(id);
    if(el){
        el.addEventListener('mousedown', (e) => e.stopPropagation());
        el.addEventListener('touchstart', (e) => e.stopPropagation());
    }
});

function updateX(e) { 
    if(isPaused || !canDrop || isGameOver) return;
    const rect = render.canvas.getBoundingClientRect(); 
    const clientX = e.clientX ?? e.touches?.[0].clientX ?? currentX;
    const newX = Math.max(30, Math.min(WIDTH-30, clientX - rect.left));
    const diff = newX - currentX; currentAngle += diff * 0.05; currentX = newX;
    if (Math.abs(currentX - lastSoundX) > 15) { playSE(seRotate, 'rotate'); lastSoundX = currentX; }
}

window.addEventListener('mousedown', (e) => { 
    if(isGameOver) { handleEnd(); return; }
    if(canDrop && !isPaused) { isDragging = true; updateX(e); } 
});
window.addEventListener('mousemove', updateX);
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', (e) => { 
    if(isGameOver) { handleEnd(); return; }
    if(canDrop && !isPaused) { isDragging = true; updateX(e); } 
}, {passive: false});
window.addEventListener('touchmove', updateX, {passive: false});
window.addEventListener('touchend', handleEnd);

// --- スマホ復帰時の暗転・フリーズ対策 ---
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        // 画面から離れたら強制的に一時停止
        if (gameStarted && !isGameOver && !isPaused) {
            pauseGame();
        }
    } else {
        // 画面に戻ってきたときの処理
        if (!isGameOver && gameStarted) {
            // エンジンとレンダラーを再キック
            Runner.run(runner, engine);
            Render.run(render);
            
            // 一時停止中でなければ描画を安定させるために少し遅延して再開
            if (!isPaused) {
                // 自動で再開させたくない場合は、pauseGame()の状態を維持
            }
        }
    }
});

// windowのリサイズ時にも描画が消えないよう再描画を促す
window.addEventListener("resize", () => {
    if (render && render.canvas) {
        Render.run(render);
    }
});

preloadImages(() => { updateUI(); Render.run(render); Runner.run(runner, engine); });
</script>
</body>
</html>
